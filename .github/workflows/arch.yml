# SPDX-License-Identifier: GPL-2.0-or-later
name: arch

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
      strace-repository:
        required: false
        type: string
        default: strace/strace
      strace-ref:
        required: false
        type: string
        default: master
      strace-patches:
        required: false
        type: string
        default: ""
      shards:
        required: false
        type: number
        default: 20

jobs:
  prepare:
    name: Prepare shards (${{ inputs.arch }})
    runs-on: ubuntu-24.04
    outputs:
      shards: ${{ steps.gen.outputs.shards }}
    steps:
      - name: Build shard index list
        id: gen
        run: echo "shards=$(seq 1 ${{ inputs.shards }} | jq -cs .)" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ inputs.arch }} (toolchain + strace)
    runs-on: ubuntu-24.04
    outputs:
      strace_sha: ${{ steps.vars.outputs.strace_sha }}
    env:
      BUILDROOT_SRC: ${{ github.workspace }}/buildroot
      STRACE_SRC: ${{ github.workspace }}/strace
      OUTPUT_BASE: ${{ github.workspace }}/output
      STRACE_PATCHES: ${{ inputs.strace-patches }}
    steps:
      - name: Check out this action's repository
        uses: actions/checkout@v6
        with:
          repository: gabifalk/strace-github-cross-testing
          ref: ${{ github.job_workflow_sha }}

      - name: Read buildroot version
        id: brver
        run: echo "version=$(cat ci/buildroot-version)" >> "$GITHUB_OUTPUT"

      - name: Check out buildroot
        uses: actions/checkout@v6
        with:
          path: buildroot
          repository: buildroot/buildroot
          ref: ${{ steps.brver.outputs.version }}

      - name: Check out strace
        uses: actions/checkout@v6
        with:
          path: strace
          repository: ${{ inputs.strace-repository }}
          ref: ${{ inputs.strace-ref }}

      - name: Compute vars (cache key + strace sha + patch tag)
        id: vars
        run: |
          echo "cache_key=$(ci/cache-key ${{ inputs.arch }})" >> "$GITHUB_OUTPUT"
          echo "strace_sha=$(git -C strace rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "patch_tag=$(ci/patch-tag '${{ inputs.strace-patches }}')" >> "$GITHUB_OUTPUT"

      - name: Restore buildroot output cache for ${{ inputs.arch }}
        id: cache
        uses: actions/cache@v5
        with:
          path: ${{ env.OUTPUT_BASE }}/${{ inputs.arch }}
          key: ${{ steps.vars.outputs.cache_key }}

      - name: Build buildroot for ${{ inputs.arch }}
        if: steps.cache.outputs.cache-hit != 'true'
        run: ./ci/build-buildroot ${{ inputs.arch }}

      - name: Drop buildroot build tree before caching ${{ inputs.arch }}
        if: steps.cache.outputs.cache-hit != 'true'
        run: rm -rf "${{ env.OUTPUT_BASE }}/${{ inputs.arch }}/build"

      - name: Pack buildroot output for ${{ inputs.arch }}
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          tar --use-compress-program='zstd -T0 -v' \
            -cf buildroot-${{ inputs.arch }}.tar.zst \
            -C "${{ env.OUTPUT_BASE }}" ${{ inputs.arch }}

      - name: Upload buildroot output artifact for ${{ inputs.arch }}
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.vars.outputs.cache_key }}
          path: buildroot-${{ inputs.arch }}.tar.zst

      - name: Look up strace build-tree cache for ${{ inputs.arch }}
        id: scache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.STRACE_SRC }}
          key: strace-${{ steps.vars.outputs.strace_sha }}-${{ steps.vars.outputs.cache_key }}-${{ steps.vars.outputs.patch_tag }}-s${{ hashFiles('ci/build-strace', 'ci/lib.sh') }}
          lookup-only: true

      - name: Build strace for ${{ inputs.arch }}
        if: steps.scache.outputs.cache-hit != 'true'
        run: ./ci/build-strace ${{ inputs.arch }}

      - name: Save strace build tree for ${{ inputs.arch }}
        if: steps.scache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.STRACE_SRC }}
          key: strace-${{ steps.vars.outputs.strace_sha }}-${{ steps.vars.outputs.cache_key }}-${{ steps.vars.outputs.patch_tag }}-s${{ hashFiles('ci/build-strace', 'ci/lib.sh') }}

  test:
    name: Test ${{ inputs.arch }} shard ${{ matrix.shard }}/${{ inputs.shards }}
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.prepare.outputs.shards) }}
    env:
      STRACE_SRC: ${{ github.workspace }}/strace
      OUTPUT_BASE: ${{ github.workspace }}/output
      STRACE_SHARD: ${{ matrix.shard }}
      STRACE_SHARDS: ${{ inputs.shards }}
    steps:
      - name: Check out this action's repository
        uses: actions/checkout@v6
        with:
          repository: gabifalk/strace-github-cross-testing
          ref: ${{ github.job_workflow_sha }}

      - name: Compute vars (cache key + patch tag)
        id: vars
        run: |
          echo "cache_key=$(ci/cache-key ${{ inputs.arch }})" >> "$GITHUB_OUTPUT"
          echo "patch_tag=$(ci/patch-tag '${{ inputs.strace-patches }}')" >> "$GITHUB_OUTPUT"

      - name: Restore buildroot output cache for ${{ inputs.arch }}
        id: brcache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.OUTPUT_BASE }}/${{ inputs.arch }}
          key: ${{ steps.vars.outputs.cache_key }}

      - name: Fail if buildroot cache missing
        if: steps.brcache.outputs.cache-hit != 'true'
        run: |
          echo "::error::buildroot cache miss for ${{ steps.vars.outputs.cache_key }}; build job should have populated it" >&2
          exit 1

      - name: Restore strace build tree for ${{ inputs.arch }}
        id: scache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.STRACE_SRC }}
          key: strace-${{ needs.build.outputs.strace_sha }}-${{ steps.vars.outputs.cache_key }}-${{ steps.vars.outputs.patch_tag }}-s${{ hashFiles('ci/build-strace', 'ci/lib.sh') }}

      - name: Fail if strace build tree missing
        if: steps.scache.outputs.cache-hit != 'true'
        run: |
          echo "::error::strace build-tree cache miss; build job should have saved it" >&2
          exit 1

      - name: Run strace tests under QEMU (shard ${{ matrix.shard }}/${{ inputs.shards }})
        run: ./ci/run-qemu ${{ inputs.arch }}
